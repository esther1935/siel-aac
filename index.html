<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#fff7d6" />
  <title>시소 AAC — 시엘이의 소통도구</title>

  <!-- 카카오톡/SNS 공유 미리보기 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="시소 AAC" />
  <meta property="og:description" content="시엘이의 소통도구 🌱 그림으로 마음을 전해요" />
  <meta property="og:url" content="https://siel-aac.netlify.app" />
  <meta property="og:image" content="https://siel-aac.netlify.app/icon-512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:locale" content="ko_KR" />

  <!-- 카카오톡 전용 -->
  <meta name="description" content="시엘이의 소통도구 🌱 그림으로 마음을 전해요" />

  <!-- 트위터 카드 -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="시소 AAC" />
  <meta name="twitter:description" content="시엘이의 소통도구 🌱 그림으로 마음을 전해요" />
  <meta name="twitter:image" content="https://siel-aac.netlify.app/icon-512.png" />
  <link rel="manifest" href="./manifest.webmanifest?v=sielPinUpdate20260629" />
  <link rel="stylesheet" href="./styles.css?v=sielPinUpdate20260629" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="menuBtn" class="hamburger" type="button">☰</button>
      <h1>시엘 AAC</h1>
      <div class="topSpacer"></div>
    </header>

    <main class="aacLayout">
      <section class="searchPanel">
        <span class="searchIcon">🔍</span>
        <input id="searchInput" type="search" placeholder="그림 검색 (전체 검색)" />
        <button id="voiceSearchBtn" class="micBtn" type="button" title="음성검색">🎤</button>
      </section>

      <section class="sentencePanel">
        <button id="reverseOrderBtn" class="reverseOrderBtn" type="button" title="쌓임 방향 전환">⇆</button>
        <button id="clearSentenceBtn" class="clearSentenceBtn" type="button">모두 지우기</button>
        <div id="sentenceCanvas" class="sentenceCanvas"></div>
        <div id="sentenceText" class="sentenceText"></div>
      </section>

      <section class="cardsPanel">
        <div id="cardScroller" class="cardScroller"></div>
        <div id="pageDots" class="pageDots"></div>
      </section>

      <nav id="categoryBar" class="categoryBar"></nav>
    </main>

    <dialog id="adminDialog">
      <div class="adminBox">
        <button class="close" type="button" onclick="document.getElementById('adminDialog').close()">×</button>
        <!-- 헤더: 타이틀 + 관리자로 로그인 -->
        <div class="menuHeader">
          <h2>시엘 AAC 메뉴</h2>
          <button id="switchToAdminBtn" type="button" class="adminLoginLink">관리자로 로그인</button>
        </div>

        <!-- PIN 입력 영역 (관리자용) -->
        <div id="pinArea" class="hidden">
          <input id="pinInput" type="password" inputmode="numeric" placeholder="비밀번호 입력" />
          <button id="loginBtn" class="primary" type="button">확인</button>
        </div>

        <!-- 카테고리별 PIN 로그인 (선생님용) -->
        <div id="teacherPinArea" class="hidden">
          <p style="font-size:0.9rem;color:#888;margin:4px 0 10px;">선생님 전용: 해당 카테고리 PIN 입력</p>
          <input id="teacherPinInput" type="password" inputmode="numeric" placeholder="선생님 비밀번호" />
          <select id="teacherCategorySelect"></select>
          <button id="teacherLoginBtn" class="primary teacherMainBtn" type="button">그림추가</button>
        </div>

        <!-- 관리자 탭 (로그인 후) -->
        <div class="adminMenu hidden" id="adminMenu">
          <div class="adminTabBar">
            <button id="showUploadBtn" class="adminTab active" type="button">AAC그림관리</button>
            <span class="adminTabDivider">|</span>
            <button id="showBoardBtn" class="adminTab" type="button">게시판</button>
          </div>
        </div>

        <div id="adminPanel" class="hidden">
          <section id="uploadPanel">
            <div class="adminRow">
              <label>카테고리</label>
              <div class="adminFieldGroup">
                <select id="categorySelect"></select>
                <input id="newCategory" placeholder="새로운 카테고리 이름 예: 늘봄" />
                <button id="addCategoryBtn" class="primary rightBtn" type="button">카테고리 추가</button>
              </div>
            </div>

            <details class="categoryManager" open>
              <summary>카테고리 이름·순서 관리</summary>
              <div id="categoryManageList" class="categoryManageList"></div>
            </details>

            <div class="adminRow imageAddRow">
              <label>그림 이름</label>
              <div class="adminFieldGroup">
                <input id="imageInput" type="file" accept="image/*" />
                <input id="cardText" placeholder="예 : 귤" />
                <input id="cardSpeak" class="hidden" />
                <button id="addCardBtn" class="primary rightBtn" type="button">그림 추가</button>
                <button id="cancelEditBtn" class="hidden rightBtn" type="button">수정 취소</button>
                <div class="editStatus" id="editStatus">새 그림 추가 모드입니다.</div>
              </div>
            </div>

            <!-- 동사 연결 선택 -->
            <div class="adminRow" id="verbSelectRow" style="display:none;">
              <label style="font-size:0.9rem;">동사 연결<br/><span style="font-size:0.75rem;color:#aaa;font-weight:400;">중복 선택 가능</span></label>
              <div class="adminFieldGroup" style="flex-direction:column;gap:8px;">
                <button id="verbToggleBtn" type="button" class="verbToggleBtn">＋ 동사 선택하기</button>
                <div id="verbChipArea" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                <div id="verbPickerPanel" style="display:none;background:#f8f5ff;border-radius:12px;padding:10px;max-height:180px;overflow-y:auto;">
                  <div id="verbPickerList" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
                </div>
              </div>
            </div>

            <h3 class="manageTitle">현재 그림 수정, 삭제</h3>
            <div id="deleteList" class="deleteList"></div>
          </section>

          <section id="boardPanel" class="hidden">
            <h3>시엘 게시판</h3>
            <textarea id="boardText" placeholder="예: 오늘 시엘이가 '귤'을 자주 눌렀어요."></textarea>
            <button id="saveBoardBtn" class="primary" type="button">게시판 저장</button>
            <div id="boardView" class="boardView"></div>
          </section>

          <div id="syncStatus" class="syncStatus">오프라인 저장 준비 중</div>

          <!-- 비밀번호 관리 -->
          <details class="categoryManager" id="pinManager" style="display:none;">
            <summary>🔐 비밀번호 관리</summary>
            <div style="padding:12px;display:flex;flex-direction:column;gap:10px;">
              <div class="adminRow">
                <label>관리자 비번 변경</label>
                <div class="adminFieldGroup">
                  <input id="newAdminPin" type="password" inputmode="numeric" placeholder="새 비밀번호 (숫자)" style="max-width:160px;"/>
                  <input id="newAdminPinConfirm" type="password" inputmode="numeric" placeholder="다시 입력" style="max-width:160px;"/>
                  <button id="changeAdminPinBtn" class="primary rightBtn" type="button">변경</button>
                </div>
              </div>
              <div id="teacherPinList" style="display:flex;flex-direction:column;gap:8px;">
                <p style="font-size:0.85rem;color:#666;margin:4px 0;">선생님별 비번 — 해당 카테고리에만 그림 추가 가능</p>
              </div>
              <button id="addTeacherPinBtn" type="button" class="primary" style="align-self:flex-start;">+ 선생님 비번 추가</button>
            </div>
          </details>

          <div class="backupRow">
            <button id="exportBtn" type="button">백업 다운로드</button>
            <label class="importLabel">백업 불러오기
              <input id="importInput" type="file" accept="application/json" />
            </label>
          </div>
        </div>
      </div>
    </dialog>
  </div>

  <!-- 이미지 크롭 모달 -->
  <dialog id="cropDialog" style="padding:0;border:none;border-radius:12px;max-width:95vw;max-height:95vh;overflow:hidden;">
    <div style="background:#1a1a2e;padding:16px;display:flex;flex-direction:column;gap:12px;min-width:300px;">
      <h3 style="margin:0;color:#e0e0ff;text-align:center;">그림 편집</h3>

      <!-- 모드 선택 탭 -->
      <div style="display:flex;gap:6px;background:#0d0d1a;border-radius:8px;padding:4px;">
        <button id="modeCropBtn" type="button" style="flex:1;padding:8px;border:none;border-radius:6px;font-size:0.85rem;cursor:pointer;background:#a78bfa;color:#fff;">✋ 이동·확대</button>
        <button id="modeFitBtn" type="button" style="flex:1;padding:8px;border:none;border-radius:6px;font-size:0.85rem;cursor:pointer;background:transparent;color:#aaa;">🔍 축소 맞춤</button>
      </div>

      <div style="position:relative;overflow:hidden;background:#000;border-radius:8px;touch-action:none;" id="cropContainer">
        <canvas id="cropCanvas" style="display:block;max-width:100%;max-height:50vh;"></canvas>
        <!-- 자르기 모드 오버레이 -->
        <div id="cropOverlay" style="position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;">
          <div id="cropBox" style="position:absolute;border:2px solid #a78bfa;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);cursor:move;touch-action:none;"></div>
        </div>
        <!-- 축소 맞춤 미리보기 캔버스 -->
        <canvas id="fitPreviewCanvas" style="display:none;max-width:100%;max-height:50vh;"></canvas>
      </div>

      <p id="cropHint" style="color:#aaa;font-size:0.8rem;text-align:center;margin:0;">박스를 드래그하거나 캔버스를 눌러 영역을 선택하세요</p>

      <div style="display:flex;gap:8px;justify-content:center;">
        <button id="cropConfirmBtn" type="button" style="background:#a78bfa;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:1rem;cursor:pointer;">✅ 완료</button>
        <button id="cropCancelBtn" type="button" style="background:#444;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:1rem;cursor:pointer;">취소</button>
      </div>
    </div>
  </dialog>

  <script type="module" src="./app.js?v=sielPinUpdate20260629"></script>
</body>
</html>
